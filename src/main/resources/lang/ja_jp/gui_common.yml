  critical:
    title: 重大な設定
    reset_expansion:
      display: §c§nワールド拡張を初期化
      lore:
      - §8§m－－－－－－－－－－－－－－－－－－
      - §f§l| §7現在の拡張レベル §e§l{level}
      - §f§l| §7返還されるポイント §6🛖 §e{points}
      - §8§m－－－－－－－－－－－－－－－－－－
      - §e§nクリックして初期化を実行（この操作は取り消せません）
      - §8§m－－－－－－－－－－－－－－－－－－
      lore_unavailable:
      - §cまた拡張されていないため、初期化できません
    archive_world:
      display: §6§nワールドをアーカイブ
      lore:
      - §8§m－－－－－－－－－－－－－－－－－－
      - §7ワールドをアーカイブします。
      - §7アーカイブされたワールドはプレイヤーが
      - §7アクセスできなくなりますが、データは保持されます。
      - §8§m－－－－－－－－－－－－－－－－－－
      - §e§nクリックして実行
      - §8§m－－－－－－－－－－－－－－－－－－
      lore_cooldown:
      - §8§m－－－－－－－－－－－－－－－－－－
      - §7ワールドをアーカイブします。
      - §7アーカイブされたワールドはプレイヤーが
      - §7アクセスできなくなりますが、データは保持されます。
      - §8§m－－－－－－－－－－－－－－－－－－
      - §c前回の操作から {cooldown_hours} 時間経過するまで実行できません。
      - §8(残り約 {hours_remaining} 時間)
      - §8§m－－－－－－－－－－－－－－－－－－
    delete_world:
      display: §4§l§nワールドを削除
      lore:
      - §8§m－－－－－－－－－－－－－－－－－－
      - §7ワールドを完全に削除します。
      - §7この操作は取り消せません。
      - §8§m－－－－－－－－－－－－－－－－－－
      - '§f§l| §7返還されるポイント: §6🛖 §e{points}'
      - §8(消費したポイントのうち、{percent}%が返還されます)
      - §8§m－－－－－－－－－－－－－－－－－－
      - §4§lクリックして削除を実行（この操作は取り消せません）
      - §8§m－－－－－－－－－－－－－－－－－－
      lore_unavailable_slot:
      - §8§m－－－－－－－－－－－－－－－－－－
      - §7ワールドを完全に削除します。
      - §7この操作は取り消せません。
      - §8§m－－－－－－－－－－－－－－－－－－
      - §c現在の上限拡張値では削除を実行できません。
      - '§f§l| §7オーナーの上限拡張値: §e{slots}'
      - §8§m－－－－－－－－－－－－－－－－－－
