    reset_expansion:
      title: Confirm Reset
      lore:
      - §cAre you sure you want to reset?
      - §7Expansion level will be reset and points refunded.
      - §7World border will return to initial size.
    delete_1:
      title: Delete Confirm (1/2)
      lore:
      - §cAre you sure you want to DELETE?
      - §7All data will be lost forever.
      - §7※ There will be a final confirmation.
      next: §cProceed
    delete_2:
      title: Final Confirmation (2/2)
      lore:
      - §4§lARE YOU POSITIVE?
      - '§c§lWARNING: This is the final step.'
      confirm_btn: §4§l【CONFIRM DELETE】
  critical:
    title: Critical Settings
    reset_expansion:
      display: §c§nReset Expansion
      lore:
      - §f§l| §7Current level §e§l{level}
      - ''
      - §f§l| §7Refund points §6🛖 §e{points}
      - ''
      - §e§nClick to reset (Irreversible)
      lore_unavailable:
      - §cCannot reset (not expanded)
    archive_world:
      display: §6§nArchive World
      lore:
      - §8§m-----------------------
      - §7Archives the world.
      - §7Archived worlds cannot be accessed by players,
      - §7but data is preserved.
      - §8§m-----------------------
      - §e§nClick to archive
      - §8§m-----------------------
      lore_cooldown:
      - §8§m-----------------------
      - §7Archives the world.
      - §7Archived worlds cannot be accessed by players,
      - §7but data is preserved.
      - §8§m-----------------------
      - §cCannot perform until {cooldown_hours}h has passed since last action.
      - §8(About {hours_remaining}h remaining)
      - §8§m-----------------------
    delete_world:
      display: §4§l§nDelete World
      lore:
      - §7Deletes the world permanently.
      - §7This action is irreversible.
      - ''
      - §8§m-----------------------
      - '§f§l| §7Refund points: §6🛖 §e{points}'
      - §8({percent}% of total spent points returned)
      - §8§m-----------------------
      - ''
      - §4§lClick to DELETE (Irreversible)
      lore_unavailable_slot:
      - §8§m-----------------------
      - §7Deletes the world permanently.
      - §7This action is irreversible.
      - §8§m-----------------------
      - §cCannot execute delete with current owner slot expansion.
      - '§f§l| §7Owner slot expansion: §e{slots}'
      - §8§m-----------------------
